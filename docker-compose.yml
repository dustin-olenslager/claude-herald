services:
  herald:
    build: .
    image: herald:local
    container_name: herald
    restart: unless-stopped
    init: true
    env_file: .env
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      herald-net: {}

networks:
  herald-net:
    name: herald-net
    external: true
