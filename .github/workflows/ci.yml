name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: node --check src/*.mjs
        run: |
          find src -name '*.mjs' -print0 | xargs -0 -I{} node --check {}

      - name: bash -n shell scripts
        run: |
          find . -name '*.sh' -not -path './node_modules/*' -print0 | xargs -0 -I{} bash -n {}

      - name: npm test
        run: npm test
